name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Diff-aware PR verification
        if: github.event_name == 'pull_request'
        run: npm run verify:changed -- --run --base origin/main

      - name: Code health self-test
        if: github.event_name != 'pull_request'
        run: npm run test:code-health

      - name: Code health ratchet
        if: github.event_name != 'pull_request'
        run: npm run code:health -- --fail-on-regression --base origin/main

      - name: Typecheck
        if: github.event_name != 'pull_request'
        run: npm run lint

      - name: Test typecheck
        if: github.event_name != 'pull_request'
        run: npm run lint:tests

      - name: Supabase function typecheck
        if: github.event_name != 'pull_request'
        run: npm run lint:supabase-functions

      - name: Supabase function tests
        if: github.event_name != 'pull_request'
        run: npm run test:supabase-functions

      - name: Product taxonomy lint
        if: github.event_name != 'pull_request'
        run: npm run product:lint

      - name: Architecture lint
        if: github.event_name != 'pull_request'
        run: npm run architecture:lint

      - name: Jest (CI + coverage)
        if: github.event_name != 'pull_request'
        run: npm run test:ci

      - name: Upload coverage artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: error

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not set; skipping Slack notification."
            exit 0
          fi
          payload=$(jq -n \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg ref "$GITHUB_REF_NAME" \
            --arg sha "$GITHUB_SHA" \
            --arg url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            '{text: ("CI failed for " + $repo + " on " + $ref + " (" + $sha + "). " + $url)}')
          curl -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL"
